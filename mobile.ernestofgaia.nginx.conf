# ─── mobile.ernestofgaia.xyz ─────────────────────────────────────────────────
# Drop this file alongside your existing ernestofgaia.nginx.conf.
# After setting up DNS for mobile.ernestofgaia.xyz, copy the mobile site
# files to /var/www/mobile-ernestofgaia/ and reload nginx.
# Then run: certbot --nginx -d mobile.ernestofgaia.xyz

server {
    listen 80;
    listen [::]:80;
    server_name mobile.ernestofgaia.xyz;

    # Redirect HTTP → HTTPS once SSL is configured (uncomment after certbot)
    # return 301 https://$host$request_uri;

    root /var/www/mobile-ernestofgaia;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml image/png;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

