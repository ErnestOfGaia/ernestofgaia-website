# ─── Mobile User-Agent detection ─────────────────────────────────────────────
# Matches phones (not tablets). Add to the http{} block or at the top of this
# file if your nginx setup supports map{} at server level.
# If your nginx.conf already has a map block, merge this into it instead.
map $http_user_agent $is_mobile {
    default 0;
    "~*(android.*mobile|iphone|ipod|blackberry|iemobile|opera mini|windows phone)" 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name ernestofgaia.xyz www.ernestofgaia.xyz;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    root /var/www/ernestofgaia/dist;
    index index.html;

    # ── Mobile redirect ───────────────────────────────────────────────────────
    # Sends phone visitors to the mobile subdomain.
    # Remove or comment out this block if you want to disable the redirect.
    if ($is_mobile) {
        return 302 https://mobile.ernestofgaia.xyz$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively (Vite hashes filenames on build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — always serve index.html for unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

